<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سولارا 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #041612 0%, #062C24 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Cairo', sans-serif;
            color: #F1F5F9;
        }
        .login-box {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 184, 0, 0.2);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            font-weight: 900;
            color: #FFB800;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(4, 22, 18, 0.5);
            border: 1px solid rgba(255, 184, 0, 0.2);
            border-radius: 8px;
            color: #F1F5F9;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #FFB800;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #FFB800;
            color: #041612;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: #E6A600;
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .back-link {
            margin-top: 1.5rem;
            color: #94A3B8;
        }
        .back-link a {
            color: #FFB800;
            text-decoration: none;
        }
        .register-link {
            margin-top: 1rem;
            color: #94A3B8;
        }
        .register-link a {
            color: #FFB800;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <a href="/" class="logo">
            <i class="fas fa-solar-panel"></i>
            سولارا 2026
        </a>
        <h2>تسجيل الدخول</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="بريدك الإلكتروني" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i>
                تسجيل الدخول
            </button>
            <p class="error-msg" id="errorMsg">البريد الإلكتروني أو كلمة المرور غير صحيحة</p>
        </form>
        <p class="back-link">
            <a href="/">العودة للرئيسية</a>
        </p>
        <p class="register-link">
            ليس لديك حساب؟
            <a href="/register">إنشاء حساب</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var loginBtn = document.getElementById('loginBtn');
            var errorMsg = document.getElementById('errorMsg');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
            errorMsg.classList.remove('show');

            try {
                var response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                var data = await response.json();

                if (data.success) {
                    Auth.saveAuth(data);
                    
                    // Store role in localStorage for easy access
                    var role = data.user.role;
                    localStorage.setItem("role", role);
                    
                    // Direct redirect with short loading state
                    loginBtn.innerHTML = '<i class="fas fa-check"></i> جاري التوجيه...';
                    setTimeout(() => {
                        window.location.href = "/index_final_v2.html";
                    }, 500);
                } else {
                    errorMsg.textContent = data.message || 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = 'حدث خطأ في الاتصال بالخادم';
                errorMsg.classList.add('show');
            }

            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
        });
    </script>
</body>
</html>
