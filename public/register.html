<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - سولارا 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #041612 0%, #062C24 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Cairo', sans-serif;
            color: #F1F5F9;
        }
        .register-box {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 184, 0, 0.2);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            font-weight: 900;
            color: #FFB800;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(4, 22, 18, 0.5);
            border: 1px solid rgba(255, 184, 0, 0.2);
            border-radius: 8px;
            color: #F1F5F9;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #FFB800;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #FFB800;
            color: #041612;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: #E6A600;
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .login-link {
            margin-top: 1.5rem;
            color: #94A3B8;
        }
        .login-link a {
            color: #FFB800;
            text-decoration: none;
        }
        .social-login-container {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .social-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .btn-google { background: #db4437; }
        .btn-google:hover { background: #c53929; }
        .btn-facebook { background: #4267B2; }
        .btn-facebook:hover { background: #365899; }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #94A3B8;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 184, 0, 0.2);
        }
        .divider span { padding: 0 10px; }
    </style>
</head>
<body>
    <div class="register-box">
        <a href="/" class="logo">
            <i class="fas fa-solar-panel"></i>
            سولارا 2026
        </a>
        <h2>إنشاء حساب جديد</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="name" placeholder="أدخل اسمك الكامل" required>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="بريدك الإلكتروني" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
            <button type="button" class="btn-primary" id="registerBtn" onclick="registerUser()">
                <i class="fas fa-user-plus"></i>
                إنشاء حساب
            </button>
            <p class="error-msg" id="errorMsg"></p>
        </form>

        <div class="divider"><span>أو</span></div>
        <div style="text-align:center; margin-top:10px;"></div>
        <div class="social-login-container">
            <!-- Google Identity Services Button Container -->
            <div id="googleBtnContainer" style="display: flex; justify-content: center; width: 100%;"></div>

            <button class="social-btn btn-facebook" onclick="handleSocial('facebook')">
                <i class="fab fa-facebook-f"></i> إنشاء حساب باستخدام Facebook
            </button>
        </div>

        <p class="login-link">
            لديك حساب بالفعل؟
            <a href="/login.html">تسجيل الدخول</a>
        </p>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/auth.js"></script>
        <script>
        window.onload = async function () {
            try {
                const configRes = await fetch('/api/config');
                const configData = await configRes.json();
                const GOOGLE_CLIENT_ID = configData.data.GOOGLE_CLIENT_ID;

                if (!GOOGLE_CLIENT_ID) {
                    console.warn("Google Client ID is not configured on the server. Google Login is disabled.");
                    document.getElementById("googleBtnContainer").innerHTML = '<p style="color: var(--text-secondary); font-size: 0.85rem;">Google Login غير متاح (Missing Client ID)</p>';
                    return;
                }

                // Initialize Google One Tap & Button
                if (typeof google !== 'undefined' && google.accounts) {
                    google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: handleGoogleCredentialResponse,
                        auto_select: false,
                        cancel_on_tap_outside: false
                    });

                    // Render standard Google button
                    google.accounts.id.renderButton(
                        document.getElementById("googleBtnContainer"),
                        { theme: "outline", size: "large", type: "standard", text: "signup_with", width: 350 }
                    );

                    // Display One Tap
                    google.accounts.id.prompt();
                } else {
                    console.warn("Google Identity Services script failed to load.");
                }
            } catch (error) {
                console.error("Failed to load configuration:", error);
            }
        };

        function handleGoogleCredentialResponse(response) {
            const idToken = response.credential;
            authenticateSocial('google', idToken);
        }

        async function registerUser() {
            var name = document.getElementById('name').value;
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var btn = document.getElementById('registerBtn');
            var errorMsg = document.getElementById('errorMsg');

            if (!name || !email || !password) {
                errorMsg.textContent = 'يرجى ملء جميع الحقول';
                errorMsg.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإنشاء...';
            errorMsg.classList.remove('show');

            try {
                var response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, email: email, password: password })
                });

                var data = await response.json();

                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'تم إنشاء الحساب!',
                        text: 'تم تسجيلك بنجاح. جاري التوجيه لتسجيل الدخول...',
                        timer: 2000,
                        showConfirmButton: false,
                        timerProgressBar: true,
                        didClose: function() {
                            window.location.href = '/';
                        }
                    });
                } else {
                    errorMsg.textContent = data.message || 'فشل إنشاء الحساب';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                console.error('Register error:', error);
                errorMsg.textContent = 'حدث خطأ في الاتصال بالخادم';
                errorMsg.classList.add('show');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء حساب';
        }

        // Fallback for Facebook Mock Testing
        async function handleSocial(provider) {
            if (provider === 'facebook') {
                const { value: email } = await Swal.fire({
                    title: 'المحاكاة المحلية لـ Facebook',
                    input: 'email',
                    inputLabel: 'أدخل بريدك الإلكتروني',
                    inputPlaceholder: 'example@example.com',
                    showCancelButton: true,
                    confirmButtonText: 'متابعة',
                    cancelButtonText: 'إلغاء'
                });

                if (email) {
                    const mockToken = 'mock_' + email.split('@')[0];
                    authenticateSocial(provider, mockToken);
                }
            }
        }

        async function authenticateSocial(provider, token) {
            try {
                Swal.fire({
                    title: 'جاري التسجيل...',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                const response = await fetch('/api/auth/' + provider, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });

                const data = await response.json();

                if (data.success) {
                    Auth.saveAuth(data);
                    localStorage.setItem("role", data.user.role);
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'تم التسجيل بنجاح',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => {
                        window.location.href = "/"; // Default redirect to homepage
                    });
                } else {
                    Swal.fire('خطأ', data.message || 'فشل التسجيل عبر ' + provider, 'error');
                }
            } catch (error) {
                console.error('Social register error:', error);
                Swal.fire('خطأ', 'حدث خطأ في الاتصال بالخادم', 'error');
            }
        }
    </script>
</body>
</html>
