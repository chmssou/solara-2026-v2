<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملفي - سولارا 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <link rel="stylesheet" href="/css/admin.css">
    <style>
        .profile-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 30px; max-width: 600px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--solar-gold), #FF8C00); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: var(--bg-primary); }
        .profile-info h2 { font-size: 1.5rem; margin-bottom: 5px; }
        .profile-info p { color: var(--text-secondary); }
        .profile-details { display: grid; gap: 15px; }
        .profile-item { display: flex; justify-content: space-between; padding: 15px; background: rgba(4, 22, 18, 0.3); border-radius: 8px; }
        .profile-item label { color: var(--text-secondary); font-weight: 500; }
        .profile-item span { color: var(--text-primary); font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><a href="/"><i class="fas fa-solar-panel"></i> سولارا 2026</a></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/portal.html" class="nav-link"><i class="fas fa-th-large"></i><span>بوابة العملاء</span></a></li>
                <li class="nav-item"><a href="/client-profile.html" class="nav-link active"><i class="fas fa-user"></i><span>الملف الشخصي</span></a></li>
                <li class="nav-item"><a href="/settings.html" class="nav-link"><i class="fas fa-cog"></i><span>الإعدادات</span></a></li>
                <li class="nav-item"><a href="/" class="nav-link"><i class="fas fa-home"></i><span>الموقع الرئيسي</span></a></li>
                <li class="nav-item"><button type="button" class="nav-link logout-item" id="sidebarLogoutBtn"><i class="fas fa-sign-out-alt"></i><span>تسجيل الخروج</span></button></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">الملف الشخصي</h1>
                <div class="user-section">
                    
                    <div class="user-menu">
                        <div class="user-trigger">
                            <div class="user-avatar" id="userAvatar">ع</div>
                            <span class="user-name" id="userName">عميل</span>
                            <i class="fas fa-chevron-down dropdown-arrow"></i>
                        </div>
                        <div class="user-dropdown">
                            <a href="/portal.html"><i class="fas fa-th-large"></i> بوابة العملاء</a>
                            <div class="divider"></div>
                            <button class="logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
                        </div>
                    </div>
                </div>
            </header>
            <div class="content-area">
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar" id="avatarInitial">ع</div>
                        <div class="profile-info">
                            <h2 id="displayName">اسم المستخدم</h2>
                            <p id="displayEmail">email@example.com</p>
                        </div>
                    </div>
                    <div class="profile-details">
                        <div class="profile-item"><label>رقم العضوية</label><span id="userId">-</span></div>
                        <div class="profile-item"><label>نوع الحساب</label><span id="userRole">عميل</span></div>
                        <div class="profile-item"><label>تاريخ التسجيل</label><span id="userDate">-</span></div>
                    </div>
                    <button class="btn btn-primary" id="editProfileBtn"><i class="fas fa-edit"></i> تعديل الملف</button>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
        <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!Auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
            var user = Auth.getUser();
            if (user) {
                document.getElementById('userName').textContent = user.name||'عميل';
                document.getElementById('displayName').textContent = user.name||'المستخدم';
                document.getElementById('displayEmail').textContent = user.email||'-';
                document.getElementById('userId').textContent = user.id||'-';
                document.getElementById('userRole').textContent = user.role==='admin'?'مدير':'عميل';
                document.getElementById('avatarInitial').textContent = (user.name||'ع').charAt(0);
                document.getElementById('userAvatar').textContent = (user.name||'ع').charAt(0);
                if(user.created_at)document.getElementById('userDate').textContent = new Date(user.created_at).toLocaleDateString('ar-SA');
            }
            document.getElementById('editProfileBtn').addEventListener('click',function(){
                Swal.fire({title:'تعديل الملف',html:'<input id="editName" class="swal2-input" placeholder="الاسم" value="'+(user.name||'')+'"><input id="editEmail" class="swal2-input" placeholder="البريد" value="'+(user.email||'')+'"><input id="editPassword" class="swal2-input" type="password" placeholder="كلمة مرور جديدة">',preConfirm:function(){return{name:document.getElementById('editName').value,email:document.getElementById('editEmail').value,password:document.getElementById('editPassword').value}}}).then(function(r){
                    if(r.isConfirmed){
                        var token=Auth.getToken();
                        fetch('/api/client/profile',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(r.value)}).then(function(res){return res.json();}).then(function(d){
                            if(d.success){Swal.fire('تم','تم التحديث','success').then(function(){window.location.reload();});}else{Swal.fire('خطأ',d.message,'error');}
                        });
                    }
                });
            });
        });
        document.getElementById('logoutBtn').addEventListener('click',function(){Auth.logout();});
    </script>
</body>
</html>
