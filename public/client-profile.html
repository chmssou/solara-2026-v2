<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملفي - سولارا 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg-primary: #041612; --bg-secondary: #062C24; --text-primary: #F1F5F9; --text-secondary: #94A3B8; --solar-gold: #FFB800; --card-bg: rgba(30, 41, 59, 0.4); --glass-border: rgba(255, 184, 0, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); min-height: 100vh; color: var(--text-primary); }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: rgba(4, 22, 18, 0.95); border-left: 1px solid var(--glass-border); padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid rgba(255, 184, 0, 0.1); margin-bottom: 20px; }
        .sidebar-logo a { color: var(--solar-gold); font-size: 1.3rem; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-menu { list-style: none; }
        .nav-item { margin: 5px 10px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px 16px; color: var(--text-secondary); text-decoration: none; border-radius: 10px; transition: all 0.3s; font-weight: 500; }
        .nav-link:hover { background: rgba(255, 184, 0, 0.1); color: var(--solar-gold); }
        .nav-link.active { background: rgba(255, 184, 0, 0.15); color: var(--solar-gold); border-right: 3px solid var(--solar-gold); }
        .main-content { flex: 1; margin-right: 260px; display: flex; flex-direction: column; }
        .top-header { background: rgba(4, 22, 18, 0.95); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; }
        .page-title { font-size: 1.2rem; font-weight: 600; }
        .user-section { display: flex; align-items: center; gap: 15px; }
        .user-menu { position: relative; }
        .user-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px 12px; border-radius: 8px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--solar-gold), #FF8C00); display: flex; align-items: center; justify-content: center; color: var(--bg-primary); font-weight: 700; font-size: 14px; }
        .user-name { font-weight: 500; }
        .dropdown-arrow { font-size: 10px; color: var(--text-secondary); }
        .user-dropdown { display: none; position: absolute; top: 50px; right: 0; background: #062C24; border: 1px solid var(--glass-border); border-radius: 12px; min-width: 180px; z-index: 1000; }
        .user-menu:hover .user-dropdown { display: block; }
        .user-dropdown a, .user-dropdown button { display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: var(--text-primary); text-decoration: none; width: 100%; border: none; background: none; font-family: 'Cairo', sans-serif; font-size: 14px; cursor: pointer; text-align: right; }
        .logout-item { color: #ef4444; }
        .content-area { padding: 30px; flex: 1; }
        .profile-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 30px; max-width: 600px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--solar-gold), #FF8C00); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: var(--bg-primary); }
        .profile-info h2 { font-size: 1.5rem; margin-bottom: 5px; }
        .profile-info p { color: var(--text-secondary); }
        .profile-details { display: grid; gap: 15px; }
        .profile-item { display: flex; justify-content: space-between; padding: 15px; background: rgba(4, 22, 18, 0.3); border-radius: 8px; }
        .profile-item label { color: var(--text-secondary); font-weight: 500; }
        .profile-item span { color: var(--text-primary); font-weight: 600; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 600; margin-top: 20px; }
        .btn-primary { background: var(--solar-gold); color: var(--bg-primary); }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><a href="/"><i class="fas fa-solar-panel"></i> سولارا 2026</a></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/client-leads.html" class="nav-link"><i class="fas fa-user-tag"></i><span>طلباتي</span></a></li>
                <li class="nav-item"><a href="/client-profile.html" class="nav-link active"><i class="fas fa-user"></i><span>ملفي</span></a></li>
                <li class="nav-item"><a href="/" class="nav-link"><i class="fas fa-home"></i><span>الموقع الرئيسي</span></a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">ملفي</h1>
                <div class="user-section">
                    <div class="user-menu">
                        <div class="user-trigger">
                            <div class="user-avatar" id="userAvatar">ع</div>
                            <span class="user-name" id="userName">عميل</span>
                            <i class="fas fa-chevron-down dropdown-arrow"></i>
                        </div>
                        <div class="user-dropdown">
                            <button class="logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
                        </div>
                    </div>
                </div>
            </header>
            <div class="content-area">
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar" id="avatarInitial">ع</div>
                        <div class="profile-info">
                            <h2 id="displayName">اسم المستخدم</h2>
                            <p id="displayEmail">email@example.com</p>
                        </div>
                    </div>
                    <div class="profile-details">
                        <div class="profile-item"><label>رقم العضوية</label><span id="userId">-</span></div>
                        <div class="profile-item"><label>نوع الحساب</label><span id="userRole">عميل</span></div>
                        <div class="profile-item"><label>تاريخ التسجيل</label><span id="userDate">-</span></div>
                    </div>
                    <button class="btn btn-primary" id="editProfileBtn"><i class="fas fa-edit"></i> تعديل الملف</button>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!Auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
            var user = Auth.getUser();
            if (user) {
                document.getElementById('userName').textContent = user.name||'عميل';
                document.getElementById('displayName').textContent = user.name||'المستخدم';
                document.getElementById('displayEmail').textContent = user.email||'-';
                document.getElementById('userId').textContent = user.id||'-';
                document.getElementById('userRole').textContent = user.role==='admin'?'مدير':'عميل';
                document.getElementById('avatarInitial').textContent = (user.name||'ع').charAt(0);
                document.getElementById('userAvatar').textContent = (user.name||'ع').charAt(0);
                if(user.created_at)document.getElementById('userDate').textContent = new Date(user.created_at).toLocaleDateString('ar-SA');
            }
            document.getElementById('editProfileBtn').addEventListener('click',function(){
                Swal.fire({title:'تعديل الملف',html:'<input id="editName" class="swal2-input" placeholder="الاسم" value="'+(user.name||'')+'"><input id="editEmail" class="swal2-input" placeholder="البريد" value="'+(user.email||'')+'"><input id="editPassword" class="swal2-input" type="password" placeholder="كلمة مرور جديدة">',preConfirm:function(){return{name:document.getElementById('editName').value,email:document.getElementById('editEmail').value,password:document.getElementById('editPassword').value}}}).then(function(r){
                    if(r.isConfirmed){
                        var token=Auth.getToken();
                        fetch('/api/client/profile',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(r.value)}).then(function(res){return res.json();}).then(function(d){
                            if(d.success){Swal.fire('تم','تم التحديث','success').then(function(){window.location.reload();});}else{Swal.fire('خطأ',d.message,'error');}
                        });
                    }
                });
            });
        });
        document.getElementById('logoutBtn').addEventListener('click',function(){Auth.logout();});
    </script>
</body>
</html>
