<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحليلات - سولارا 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-primary: #041612; --bg-secondary: #062C24; --text-primary: #F1F5F9; --text-secondary: #94A3B8; --solar-gold: #FFB800; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); min-height: 100vh; color: var(--text-primary); }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: rgba(4, 22, 18, 0.95); border-left: 1px solid rgba(255, 184, 0, 0.15); padding: 20px 0; flex-shrink: 0; }
        .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid rgba(255, 184, 0, 0.1); margin-bottom: 20px; }
        .sidebar-logo a { color: var(--solar-gold); font-size: 1.3rem; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-menu { list-style: none; }
        .nav-item { margin: 5px 10px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px 16px; color: var(--text-secondary); text-decoration: none; border-radius: 10px; transition: all 0.3s; font-weight: 500; }
        .nav-link:hover { background: rgba(255, 184, 0, 0.1); color: var(--solar-gold); }
        .nav-link.active { background: rgba(255, 184, 0, 0.15); color: var(--solar-gold); border-right: 3px solid var(--solar-gold); }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .top-header { background: rgba(4, 22, 18, 0.95); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 184, 0, 0.15); }
        .page-title { font-size: 1.2rem; font-weight: 600; }
        .user-section { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: transparent; border: 1px solid rgba(239, 68, 68, 0.5); color: #ef4444; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: 'Cairo', sans-serif; }
        .logout-btn:hover { background: #ef4444; color: white; }
        .content-area { padding: 30px; flex: 1; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 184, 0, 0.2); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-card .icon { font-size: 2rem; color: var(--solar-gold); margin-bottom: 10px; }
        .stat-card .number { font-size: 2rem; font-weight: 700; color: var(--solar-gold); }
        .stat-card .label { color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .chart-card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 184, 0, 0.2); border-radius: 12px; padding: 20px; }
        .chart-card h3 { color: var(--solar-gold); margin-bottom: 15px; font-size: 1rem; }
        .chart-container { position: relative; height: 300px; }
        .loading { text-align: center; padding: 50px; color: var(--text-secondary); }
        .loading i { font-size: 2rem; color: var(--solar-gold); animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><a href="/"><i class="fas fa-solar-panel"></i> سولارا 2026</a></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/admin" class="nav-link"><i class="fas fa-th-large"></i><span>لوحة التحكم</span></a></li>
                <li class="nav-item"><a href="/leads" class="nav-link"><i class="fas fa-users"></i><span>العملاء</span></a></li>
                <li class="nav-item"><a href="/kanban" class="nav-link"><i class="fas fa-columns"></i><span>Kanban</span></a></li>
                <li class="nav-item"><a href="/analytics" class="nav-link active"><i class="fas fa-chart-bar"></i><span>التحليلات</span></a></li>
                <li class="nav-item"><a href="/settings" class="nav-link"><i class="fas fa-cog"></i><span>الإعدادات</span></a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">التحليلات والإحصائيات</h1>
                <div class="user-section"><span>مدير النظام</span><button type="button" class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button></div>
            </header>
            <div class="content-area">
                <div id="statsContainer"><div class="loading"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>الحالة حسب العدد</h3>
                        <div class="chart-container"><canvas id="statusChart"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <h3>عدد العملاء الشهري</h3>
                        <div class="chart-container"><canvas id="monthlyChart"></canvas></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
    <script>
        var statusChart, monthlyChart;
        
        document.addEventListener('DOMContentLoaded', function() {
            // Redirect non-admins away from admin-only pages
            if (Auth.redirectNonAdmins()) {
                return;
            }
            
            // Update navigation to hide admin items for non-admins
            Auth.updateNavigationForRole();
            
            loadAnalytics();
        });

        function loadAnalytics() {
            var container = document.getElementById('statsContainer');
            fetch('/api/stats')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success && data.stats) {
                    renderStats(data.stats);
                    renderCharts(data.stats);
                } else {
                    container.innerHTML = '<p>لا توجد بيانات</p>';
                }
            })
            .catch(function(err) {
                console.error('Error:', err);
                container.innerHTML = '<p>حدث خطأ</p>';
            });
        }

        function renderStats(stats) {
            var container = document.getElementById('statsContainer');
            var html = '<div class="stats-grid">';
            html += '<div class="stat-card"><div class="icon"><i class="fas fa-users"></i></div><div class="number">' + stats.total_leads + '</div><div class="label">إجمالي العملاء</div></div>';
            html += '<div class="stat-card"><div class="icon"><i class="fas fa-user-plus"></i></div><div class="number">' + stats.new_leads + '</div><div class="label">جديد</div></div>';
            html += '<div class="stat-card"><div class="icon"><i class="fas fa-map-marker-alt"></i></div><div class="number">' + stats.site_visits + '</div><div class="label">زيارة موقع</div></div>';
            html += '<div class="stat-card"><div class="icon"><i class="fas fa-trophy"></i></div><div class="number">' + stats.won_projects + '</div><div class="label">مكسوب</div></div>';
            html += '</div>';
            container.innerHTML = html;
        }

        function renderCharts(stats) {
            var statusCtx = document.getElementById('statusChart').getContext('2d');
            statusChart = new Chart(statusCtx, {
                type: 'bar',
                data: {
                    labels: ['جديد', 'تم التواصل', 'زيارة', 'عرض سعر', 'مكسوب', 'مفقود'],
                    datasets: [{
                        label: 'العدد',
                        data: [stats.status_distribution.new, stats.status_distribution.contacted, stats.status_distribution.site_visit, stats.status_distribution.proposal, stats.status_distribution.won, stats.status_distribution.lost],
                        backgroundColor: ['#3b82f6', '#f59e0b', '#eab308', '#8b5cf6', '#22c55e', '#ef4444']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } } }
            });

            var monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
            var months = stats.monthly_leads.map(function(m) { return m.month; });
            var counts = stats.monthly_leads.map(function(m) { return m.count; });
            monthlyChart = new Chart(monthlyCtx, {
                type: 'line',
                data: { labels: months, datasets: [{ label: 'العملاء', data: counts, borderColor: '#FFB800', backgroundColor: 'rgba(255, 184, 0, 0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } } }
            });
        }

        document.getElementById('logoutBtn').addEventListener('click', function() { Auth.logout(); });
    </script>
</body>
</html>
