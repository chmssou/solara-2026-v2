<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العملاء - سولارا 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Page-specific only: column widths for this table */
        th:nth-child(1), td:nth-child(1) { width: 70px; } /* ID */
        th:nth-child(2), td:nth-child(2) { width: 25%; } /* Name */
        th:nth-child(3), td:nth-child(3) { width: 100px; } /* Type */
        th:nth-child(4), td:nth-child(4) { width: 140px; } /* Phone */
        th:nth-child(5), td:nth-child(5) { width: 160px; overflow: visible; white-space: normal; } /* Status */
        th:nth-child(6), td:nth-child(6) { width: 120px; } /* Date */
        th:nth-child(7), td:nth-child(7) { width: 80px; } /* Delete */
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><a href="/"><i class="fas fa-solar-panel"></i> سولارا 2026</a></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/admin/admin-dashboard.html" class="nav-link"><i class="fas fa-th-large"></i><span>لوحة التحكم</span></a></li>
                <li class="nav-item"><a href="/admin/admin-users.html" class="nav-link"><i class="fas fa-users-cog"></i><span>العملاء / المستخدمون</span></a></li>
                <li class="nav-item"><a href="/admin/admin-leads.html" class="nav-link active"><i class="fas fa-user-tag"></i><span>الطلبات</span></a></li>
                <li class="nav-item"><a href="/settings.html" class="nav-link"><i class="fas fa-cog"></i><span>الإعدادات</span></a></li>
                <li class="nav-item"><a href="/" class="nav-link"><i class="fas fa-home"></i><span>الموقع الرئيسي</span></a></li>
                <li class="nav-item"><button type="button" class="nav-link logout-item" id="sidebarLogoutBtn"><i class="fas fa-sign-out-alt"></i><span>تسجيل الخروج</span></button></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">إدارة العملاء</h1>
                <div class="user-section">
                    <div class="user-menu">
                        <div class="user-trigger">
                            <div class="user-avatar" id="userAvatar">م</div>
                            <span class="user-name" id="userName">مدير النظام</span>
                            <i class="fas fa-chevron-down dropdown-arrow"></i>
                        </div>
                        <div class="user-dropdown">
                            <a href="/admin/admin-dashboard.html"><i class="fas fa-th-large"></i> لوحة التحكم</a>
                            <a href="/admin/admin-users.html"><i class="fas fa-users-cog"></i> العملاء / المستخدمون</a>
                            <a href="/admin/admin-leads.html"><i class="fas fa-user-tag"></i> الطلبات</a>
                            <a href="/settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
                            <div class="divider"></div>
                            <button class="logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
                        </div>
                    </div>
                </div>
            </header>
            <div class="content-area">
                <div class="section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                        <h2 class="section-title" style="margin-bottom: 0;"><i class="fas fa-users"></i> قائمة العملاء والطلبات</h2>
                    </div>
                    
                    <div class="controls-container">
                        <div class="filters" id="filterButtons">
                            <button class="filter-btn active" data-filter="all">الكل</button>
                            <button class="filter-btn" data-filter="new_request">طلب جديد</button>
                            <button class="filter-btn" data-filter="processing">قيد المعالجة</button>
                            <button class="filter-btn" data-filter="completed">مكتملة</button>
                            <button class="filter-btn" data-filter="installation">طلبات التركيب</button>
                            <button class="filter-btn" data-filter="maintenance">طلبات الصيانة</button>
                        </div>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="ابحث بالاسم، البريد، الهاتف أو رقم الطلب...">
                        </div>
                    </div>
                    
                    <div id="leadsContainer"><div class="loading">جاري التحميل...</div></div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
    <script>
        let allRequests = [];
        let currentFilter = 'all';
        let searchQuery = '';

        document.addEventListener('DOMContentLoaded', function() {
            // Use silent redirect - check admin access BEFORE showing any content
            if (!Auth.checkAdminAccess()) {
                return; // User will be redirected
            }
            
            var user = Auth.getUser();
            if (user) { document.getElementById('userName').textContent = user.name||'مدير النظام'; document.getElementById('userAvatar').textContent=(user.name||'م').charAt(0); }
            
            // Setup controls
            const searchInput = document.getElementById('searchInput');
            if(searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value.toLowerCase();
                    applyFiltersAndSearch();
                });
            }

            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.getAttribute('data-filter');
                    applyFiltersAndSearch();
                });
            });

            loadLeads();
        });
        function loadLeads() {
            var token = Auth.getToken();
            fetch('/api/requests', {headers: {'Authorization': 'Bearer ' + token}})
            .then(function(res){return res.json();})
            .then(function(data){
                if(data.success && data.requests){
                    allRequests = data.requests;
                    applyFiltersAndSearch();
                }
                else{document.getElementById('leadsContainer').innerHTML='<div class="loading">لا توجد بيانات</div>';}
            });
        }
        // Exact status key groups — mapped to real workflow values only
        const STATUS_GROUPS = {
            new_request: ['new_request'],
            processing: [
                'under_review', 'site_visit_scheduled', 'site_inspection_done',
                'quote_prepared', 'awaiting_client_approval', 'approved',
                'installation_scheduled', 'initial_diagnosis', 'visit_scheduled', 'in_progress'
            ],
            completed: ['completed', 'resolved', 'closed', 'follow_up']
        };

        function applyFiltersAndSearch() {
            let filtered = allRequests.filter(r => {
                const status = r.status || '';
                const type   = r.request_type || '';

                // --- Type filters ---
                if (currentFilter === 'installation' && type !== 'installation') return false;
                if (currentFilter === 'maintenance'  && type !== 'maintenance')  return false;

                // --- Status group filters (exact key match) ---
                if (currentFilter === 'new_request' && !STATUS_GROUPS.new_request.includes(status))  return false;
                if (currentFilter === 'processing'  && !STATUS_GROUPS.processing.includes(status))   return false;
                if (currentFilter === 'completed'   && !STATUS_GROUPS.completed.includes(status))    return false;

                // --- Search (works on top of any active filter) ---
                if (searchQuery) {
                    const typeAr = type === 'maintenance' ? 'صيانة' : 'تركيب';
                    const haystack = `${r.id} ${r.name||''} ${r.email||''} ${r.phone||''} ${typeAr}`.toLowerCase();
                    if (!haystack.includes(searchQuery)) return false;
                }

                return true;
            });
            renderTable(filtered);
        }
        function renderTable(requests) {
            var c=document.getElementById('leadsContainer');
            if(!requests||requests.length===0){c.innerHTML='<div class="loading">لا يوجد طلبات تطابق بحثك</div>';return;}
            var html='<div class="table-wrapper"><table><thead><tr><th>رقم</th><th>الاسم</th><th>النوع</th><th>الهاتف</th><th>الحالة</th><th>تاريخ</th><th>حذف</th></tr></thead><tbody>';
            
            requests.forEach(function(r){
                var typeLabel = r.request_type === 'maintenance' ? 'صيانة' : 'تركيب';
                var dotClass = 'status-' + (r.status || 'default');
                
                html+='<tr><td>#'+r.id+'</td><td><span class="lead-name-link">'+(r.name||'')+'</span></td><td>'+typeLabel+'</td><td>'+(r.phone||'')+'</td>';
                html+='<td><span class="status-dot ' + dotClass + '"></span><select class="status-select" onchange="updateStatus('+r.id+',this.value)">';
                
                // Show a subset of common statuses for quick update
                const options = [
                    {val:'new_request', lbl:'طلب جديد'},
                    {val:'under_review', lbl:'قيد المراجعة'},
                    {val:'approved', lbl:'موافق عليه'},
                    {val:'in_progress', lbl:'جاري التنفيذ'},
                    {val:'completed', lbl:'مكتمل'},
                    {val:'resolved', lbl:'تم الحل'}
                ];
                let found = false;
                options.forEach(opt => {
                    if (r.status === opt.val) found = true;
                    html+='<option value="'+opt.val+'" '+(r.status===opt.val?'selected':'')+'>'+opt.lbl+'</option>';
                });
                if (!found && r.status) {
                    html+='<option value="'+r.status+'" selected>'+(r.status_label||r.status)+'</option>';
                }

                
                html+='</select></td><td>'+new Date(r.created_at).toLocaleDateString('ar-SA')+'</td>';
                html+='<td><button class="btn btn-delete" onclick="deleteLead('+r.id+')"><i class="fas fa-trash"></i></button></td></tr>';
            });
            html+='</tbody></table></div>';
            c.innerHTML=html;
        }
        function updateStatus(id, status) {
            var token=Auth.getToken();
            fetch('/api/requests/'+id+'/status',{
                method:'PATCH',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({status:status})
            })
            .then(function(res){return res.json();})
            .then(function(d){
                if(d.success){Swal.fire('تم','تم تحديث الحالة','success');}
                else{Swal.fire('خطأ',d.message,'error');loadLeads();}
            });
        }
        function deleteLead(id) {
            var token=Auth.getToken();
            Swal.fire({title:'حذف الطلب',text:'هل أنت متأكد؟',icon:'warning',showCancelButton:true}).then(function(r){
                if(r.isConfirmed){
                    fetch('/api/requests/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}}).then(function(res){return res.json();}).then(function(d){
                        if(d.success){Swal.fire('تم','تم الحذف بنجاح','success').then(loadLeads);}else{Swal.fire('خطأ',d.message,'error');}
                    });
                }
            });
        }
        document.getElementById('logoutBtn').addEventListener('click',function(){Auth.logout();});
        var sideLogoutBtn=document.getElementById('sidebarLogoutBtn');
        if(sideLogoutBtn)sideLogoutBtn.addEventListener('click',function(){Auth.logout();});
    </script>
</body>
</html>
