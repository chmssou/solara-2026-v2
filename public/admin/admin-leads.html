
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العملاء - سولارا 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg-primary: #041612; --bg-secondary: #062C24; --text-primary: #F1F5F9; --text-secondary: #94A3B8; --solar-gold: #FFB800; --card-bg: rgba(30, 41, 59, 0.4); --glass-border: rgba(255, 184, 0, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); min-height: 100vh; color: var(--text-primary); }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: rgba(4, 22, 18, 0.95); border-left: 1px solid var(--glass-border); padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid rgba(255, 184, 0, 0.1); margin-bottom: 20px; }
        .sidebar-logo a { color: var(--solar-gold); font-size: 1.3rem; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-menu { list-style: none; }
        .nav-item { margin: 5px 10px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px 16px; color: var(--text-secondary); text-decoration: none; border-radius: 10px; transition: all 0.3s; font-weight: 500; }
        .nav-link:hover { background: rgba(255, 184, 0, 0.1); color: var(--solar-gold); }
        .nav-link.active { background: rgba(255, 184, 0, 0.15); color: var(--solar-gold); border-right: 3px solid var(--solar-gold); }
        .main-content { flex: 1; margin-right: 260px; display: flex; flex-direction: column; }
        .top-header { background: rgba(4, 22, 18, 0.95); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; }
        .page-title { font-size: 1.2rem; font-weight: 600; }
        .user-section { display: flex; align-items: center; gap: 15px; }
        .user-menu { position: relative; }
        .user-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px 12px; border-radius: 8px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--solar-gold), #FF8C00); display: flex; align-items: center; justify-content: center; color: var(--bg-primary); font-weight: 700; font-size: 14px; }
        .user-name { font-weight: 500; }
        .dropdown-arrow { font-size: 10px; color: var(--text-secondary); }
        .user-dropdown { display: none; position: absolute; top: 50px; right: 0; background: #062C24; border: 1px solid var(--glass-border); border-radius: 12px; min-width: 180px; z-index: 1000; }
        .user-menu:hover .user-dropdown { display: block; }
        .user-dropdown a, .user-dropdown button { display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: var(--text-primary); text-decoration: none; width: 100%; border: none; background: none; font-family: 'Cairo', sans-serif; font-size: 14px; cursor: pointer; text-align: right; }
        .logout-item { color: #ef4444; }
        .content-area { padding: 30px; flex: 1; }
        .section { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px; }
        .section-title { color: var(--solar-gold); font-size: 1.1rem; margin-bottom: 15px; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; text-align: right; font-weight: 600; border-bottom: 2px solid rgba(255, 184, 0, 0.3); color: var(--solar-gold); }
        td { padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .status-select { padding: 6px 10px; border-radius: 6px; background: rgba(4,22,18,0.8); color: var(--text-primary); border: 1px solid var(--glass-border); font-family: 'Cairo', sans-serif; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 0.85rem; font-weight: 600; margin: 2px; }
        .btn-delete { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .lead-name-link { color: var(--solar-gold); text-decoration: none; font-weight: 600; }
        .lead-name-link:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 30px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><a href="/"><i class="fas fa-solar-panel"></i> سولارا 2026</a></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/admin/admin-dashboard.html" class="nav-link"><i class="fas fa-th-large"></i><span>لوحة التحكم</span></a></li>
                <li class="nav-item"><a href="/admin/admin-users.html" class="nav-link"><i class="fas fa-users-cog"></i><span>المستخدمون</span></a></li>
                <li class="nav-item"><a href="/admin/admin-leads.html" class="nav-link active"><i class="fas fa-user-tag"></i><span>العملاء</span></a></li>
                <li class="nav-item"><a href="/" class="nav-link"><i class="fas fa-home"></i><span>الموقع الرئيسي</span></a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">إدارة العملاء</h1>
                <div class="user-section">
                    <div class="user-menu">
                        <div class="user-trigger">
                            <div class="user-avatar" id="userAvatar">م</div>
                            <span class="user-name" id="userName">مدير النظام</span>
                            <i class="fas fa-chevron-down dropdown-arrow"></i>
                        </div>
                        <div class="user-dropdown">
                            <a href="/admin/admin-dashboard.html"><i class="fas fa-th-large"></i> لوحة التحكم</a>
                            <a href="/admin/admin-leads.html"><i class="fas fa-user-tag"></i> العملاء</a>
                            <a href="/profile.html"><i class="fas fa-user"></i> الملف الشخصي</a>
                            <div class="divider"></div>
                            <button class="logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
                        </div>
                    </div>
                </div>
            </header>
            <div class="content-area">
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-users"></i> قائمة العملاء</h2>
                    <div id="leadsContainer"><div class="loading">جاري التحميل...</div></div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Use silent redirect - check admin access BEFORE showing any content
            if (!Auth.checkAdminAccess()) {
                return; // User will be redirected
            }
            
            var user = Auth.getUser();
            if (user) { document.getElementById('userName').textContent = user.name||'مدير النظام'; document.getElementById('userAvatar').textContent=(user.name||'م').charAt(0); }
            loadLeads();
        });
        function loadLeads() {
            var token = Auth.getToken();
            fetch('/api/leads', {headers: {'Authorization': 'Bearer ' + token}})
            .then(function(res){return res.json();})
            .then(function(data){
                if(data.success&&data.leads){renderTable(data.leads);}
                else{document.getElementById('leadsContainer').innerHTML='<div class="loading">لا توجد بيانات</div>';}
            });
        }
        function renderTable(leads) {
            var c=document.getElementById('leadsContainer');
            if(!leads||leads.length===0){c.innerHTML='<div class="loading">لا يوجد عملاء</div>';return;}
            var html='<div class="table-wrapper"><table><thead><tr><th>رقم</th><th>الاسم</th><th>البريد</th><th>الهاتف</th><th>الحالة</th><th>تاريخ</th><th>حذف</th></tr></thead><tbody>';
            var statuses=['new','contacted','qualified','won','lost'];
            var labels=['جديد','تم تواصل','مؤهل','مكسوب','مفقود'];
            leads.forEach(function(l){
                var si=statuses.indexOf(l.status||'new');
                html+='<tr><td>#'+l.id+'</td><td><a href="/lead-details.html?id='+l.id+'" class="lead-name-link">'+(l.name||'')+'</a></td><td>'+(l.email||'')+'</td><td>'+(l.phone||'')+'</td>';
                html+='<td><select class="status-select" onchange="updateStatus('+l.id+',this.value)">';
                statuses.forEach(function(s,i){html+='<option value="'+s+'" '+(l.status===s?'selected':'')+'>'+labels[i]+'</option>';});
                html+='</select></td><td>'+new Date(l.created_at).toLocaleDateString('ar-SA')+'</td>';
                html+='<td><button class="btn btn-delete" onclick="deleteLead('+l.id+')"><i class="fas fa-trash"></i></button></td></tr>';
            });
            html+='</tbody></table></div>';
            c.innerHTML=html;
        }
        function updateStatus(id, status) {
            var token=Auth.getToken();
            fetch('/api/leads/'+id+'/status',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({status:status})})
            .then(function(res){return res.json();})
            .then(function(d){if(d.success){Swal.fire('تم','تم التحديث','success');}else{Swal.fire('خطأ',d.message,'error');loadLeads();}});
        }
        function deleteLead(id) {
            var token=Auth.getToken();
            Swal.fire({title:'حذف عميل',text:'هل أنت متأكد؟',icon:'warning',showCancelButton:true}).then(function(r){
                if(r.isConfirmed){
                    fetch('/api/leads/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}}).then(function(res){return res.json();}).then(function(d){
                        if(d.success){Swal.fire('تم','تم الحذف','success').then(loadLeads);}else{Swal.fire('خطأ',d.message,'error');}
                    });
                }
            });
        }
        document.getElementById('logoutBtn').addEventListener('click',function(){Auth.logout();});
    </script>
</body>
</html>
