<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - سولارا 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Page-specific only (shared admin shell is in /css/admin.css) */
        .chart-container { position: relative; height: 280px; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><a href="/"><i class="fas fa-solar-panel"></i> سولارا 2026</a></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/admin/admin-dashboard.html" class="nav-link active"><i class="fas fa-th-large"></i><span>لوحة التحكم</span></a></li>
                <li class="nav-item"><a href="/admin/admin-users.html" class="nav-link"><i class="fas fa-users-cog"></i><span>العملاء / المستخدمون</span></a></li>
                <li class="nav-item"><a href="/admin/admin-leads.html" class="nav-link"><i class="fas fa-user-tag"></i><span>الطلبات</span></a></li>
                <li class="nav-item"><a href="/settings.html" class="nav-link"><i class="fas fa-cog"></i><span>الإعدادات</span></a></li>
                <li class="nav-item"><a href="/" class="nav-link"><i class="fas fa-home"></i><span>الموقع الرئيسي</span></a></li>
                <li class="nav-item"><button type="button" class="nav-link logout-item" id="sidebarLogoutBtn"><i class="fas fa-sign-out-alt"></i><span>تسجيل الخروج</span></button></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">لوحة التحكم - المدير العام</h1>
                <div class="user-section">
                    
                    <div class="user-menu">
                        <div class="user-trigger">
                            <div class="user-avatar" id="userAvatar">م</div>
                            <span class="user-name" id="userName">مدير النظام</span>
                            <i class="fas fa-chevron-down dropdown-arrow"></i>
                        </div>
                        <div class="user-dropdown">
                            <a href="/admin/admin-dashboard.html"><i class="fas fa-th-large"></i> لوحة التحكم</a>
                            <a href="/admin/admin-users.html"><i class="fas fa-users-cog"></i> العملاء / المستخدمون</a>
                            <a href="/admin/admin-leads.html"><i class="fas fa-user-tag"></i> الطلبات</a>
                            <a href="/settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
                            <div class="divider"></div>
                            <button class="logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
                        </div>
                    </div>
                </div>
            </header>
            <div class="content-area">
                <div id="statsContainer"><div class="loading">جاري التحميل...</div></div>
                <div class="charts-grid">
                    <div class="chart-card"><h3>الحالة حسب العدد</h3><div class="chart-container"><canvas id="statusChart"></canvas></div></div>
                    <div class="chart-card"><h3>عدد الطلبات الشهري</h3><div class="chart-container"><canvas id="monthlyChart"></canvas></div></div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
        <script>
        var statusChart, monthlyChart;
        document.addEventListener('DOMContentLoaded', function() {
            // Use silent redirect - check admin access BEFORE showing any content
            if (!Auth.checkAdminAccess()) {
                return; // User will be redirected
            }
            
            var user = Auth.getUser();
            if (user) { document.getElementById('userName').textContent = user.name||'مدير النظام'; document.getElementById('userAvatar').textContent=(user.name||'م').charAt(0); }
            loadDashboard();
        });
        function loadDashboard() {
            var token = Auth.getToken();
            var headers = token ? { 'Authorization': 'Bearer ' + token } : {};

            Promise.all([
                fetch('/api/requests/stats', { headers: headers }).then(function(res){ return res.json(); }).catch(function(){ return { success:false }; }),
                fetch('/api/users', { headers: headers }).then(function(res){ return res.json(); }).catch(function(){ return { success:false }; })
            ])
            .then(function(all){
                renderStats(all[0], all[1]);
                renderCharts(all[0]);
            })
            .catch(function(){
                renderStats({ success:false }, { success:false });
                renderCharts({ success:false });
            });
        }
        function renderStats(reqStatsRes, usersRes) {
            var c=document.getElementById('statsContainer');
            var stats = (reqStatsRes && reqStatsRes.success && reqStatsRes.stats) ? reqStatsRes.stats : { total:0, statusBreakdown:{}, monthlyRequests:[] };
            var breakdown = stats.statusBreakdown || {};

            var newCount = breakdown.new_request || 0;
            var processingStatuses = ['under_review','site_visit_scheduled','site_inspection_done','quote_prepared','awaiting_client_approval','approved','installation_scheduled','initial_diagnosis','visit_scheduled','in_progress'];
            var completedStatuses = ['completed','resolved','closed','follow_up'];
            var processingCount = processingStatuses.reduce(function(sum, k){ return sum + (breakdown[k] || 0); }, 0);
            var completedCount = completedStatuses.reduce(function(sum, k){ return sum + (breakdown[k] || 0); }, 0);

            var clientCount = 0;
            if (usersRes && usersRes.success && Array.isArray(usersRes.users)) {
                clientCount = usersRes.users.filter(function(u){ return u && u.role === 'client'; }).length;
            }

            c.innerHTML=
                '<div class="stats-grid">'
                +'<div class="stat-card"><div class="icon"><i class="fas fa-layer-group"></i></div><div class="number">'+(stats.total||0)+'</div><div class="label">إجمالي الطلبات</div></div>'
                +'<div class="stat-card"><div class="icon"><i class="fas fa-bell"></i></div><div class="number">'+(newCount||0)+'</div><div class="label">طلبات جديدة</div></div>'
                +'<div class="stat-card"><div class="icon"><i class="fas fa-spinner"></i></div><div class="number">'+(processingCount||0)+'</div><div class="label">قيد المعالجة</div></div>'
                +'<div class="stat-card"><div class="icon"><i class="fas fa-check-circle"></i></div><div class="number">'+(completedCount||0)+'</div><div class="label">مكتملة</div></div>'
                +'<div class="stat-card"><div class="icon"><i class="fas fa-users"></i></div><div class="number">'+(clientCount||0)+'</div><div class="label">العملاء</div></div>'
                +'</div>';
        }
        function renderCharts(reqStatsRes) {
            var stats = (reqStatsRes && reqStatsRes.success && reqStatsRes.stats) ? reqStatsRes.stats : { total:0, statusBreakdown:{}, monthlyRequests:[] };
            var breakdown = stats.statusBreakdown || {};

            var newCount = breakdown.new_request || 0;
            var processingStatuses = ['under_review','site_visit_scheduled','site_inspection_done','quote_prepared','awaiting_client_approval','approved','installation_scheduled','initial_diagnosis','visit_scheduled','in_progress'];
            var completedStatuses = ['completed','resolved','closed','follow_up'];
            var processingCount = processingStatuses.reduce(function(sum, k){ return sum + (breakdown[k] || 0); }, 0);
            var completedCount = completedStatuses.reduce(function(sum, k){ return sum + (breakdown[k] || 0); }, 0);

            var sc=document.getElementById('statusChart');
            if(sc){
                if(statusChart)statusChart.destroy();
                statusChart=new Chart(sc,{
                    type:'bar',
                    data:{labels:['طلبات جديدة','قيد المعالجة','مكتملة'],datasets:[{data:[newCount,processingCount,completedCount],backgroundColor:['#eab308','#3b82f6','#22c55e']}]},
                    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:'#94a3b8'}},x:{ticks:{color:'#94a3b8'}}}}
                });
            }

            var mc=document.getElementById('monthlyChart');
            if(mc){
                var ms=Array.isArray(stats.monthlyRequests)?stats.monthlyRequests.map(function(m){return m.month;}):[];
                var cs=Array.isArray(stats.monthlyRequests)?stats.monthlyRequests.map(function(m){return m.count;}):[];
                if(monthlyChart)monthlyChart.destroy();
                monthlyChart=new Chart(mc,{
                    type:'line',
                    data:{labels:ms,datasets:[{label:'الطلبات',data:cs,borderColor:'#FFB800',backgroundColor:'rgba(255,184,0,0.1)',fill:true,tension:0.4}]},
                    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:'#94a3b8'}},x:{ticks:{color:'#94a3b8'}}}}
                });
            }
        }
        document.getElementById('logoutBtn').addEventListener('click',function(){Auth.logout();});
        var sideLogoutBtn=document.getElementById('sidebarLogoutBtn');
        if(sideLogoutBtn)sideLogoutBtn.addEventListener('click',function(){Auth.logout();});
    </script>
</body>
</html>
