<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستخدمون - سولارا 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Page-specific only: column widths for this table */
        th:nth-child(1), td:nth-child(1) { width: 70px; } /* ID */
        th:nth-child(2), td:nth-child(2) { width: 20%; } /* Name */
        th:nth-child(3), td:nth-child(3) { width: 25%; } /* Email */
        th:nth-child(4), td:nth-child(4) { width: 100px; } /* Role */
        th:nth-child(5), td:nth-child(5) { width: 120px; } /* Date */
        th:nth-child(6), td:nth-child(6) { width: 250px; overflow: visible; } /* Actions */
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><a href="/"><i class="fas fa-solar-panel"></i> سولارا 2026</a></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/admin/admin-dashboard.html" class="nav-link"><i class="fas fa-th-large"></i><span>لوحة التحكم</span></a></li>
                <li class="nav-item"><a href="/admin/admin-users.html" class="nav-link active"><i class="fas fa-users-cog"></i><span>العملاء / المستخدمون</span></a></li>
                <li class="nav-item"><a href="/admin/admin-leads.html" class="nav-link"><i class="fas fa-user-tag"></i><span>الطلبات</span></a></li>
                <li class="nav-item"><a href="/settings.html" class="nav-link"><i class="fas fa-cog"></i><span>الإعدادات</span></a></li>
                <li class="nav-item"><a href="/" class="nav-link"><i class="fas fa-home"></i><span>الموقع الرئيسي</span></a></li>
                <li class="nav-item"><button type="button" class="nav-link logout-item" id="sidebarLogoutBtn"><i class="fas fa-sign-out-alt"></i><span>تسجيل الخروج</span></button></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">إدارة المستخدمين</h1>
                <div class="user-section">
                    <div class="user-menu">
                        <div class="user-trigger">
                            <div class="user-avatar" id="userAvatar">م</div>
                            <span class="user-name" id="userName">مدير النظام</span>
                            <i class="fas fa-chevron-down dropdown-arrow"></i>
                        </div>
                        <div class="user-dropdown">
                            <a href="/admin/admin-dashboard.html"><i class="fas fa-th-large"></i> لوحة التحكم</a>
                            <a href="/admin/admin-users.html"><i class="fas fa-users-cog"></i> العملاء / المستخدمون</a>
                            <a href="/admin/admin-leads.html"><i class="fas fa-user-tag"></i> الطلبات</a>
                            <a href="/settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
                            <div class="divider"></div>
                            <button class="logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
                        </div>
                    </div>
                </div>
            </header>
            <div class="content-area">
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-users"></i> قائمة المستخدمين</h2>
                    <div id="usersContainer"><div class="loading">جاري التحميل...</div></div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Use silent redirect - check admin access BEFORE showing any content
            if (!Auth.checkAdminAccess()) {
                return; // User will be redirected
            }
            
            var user = Auth.getUser();
            if (user) { document.getElementById('userName').textContent = user.name||'مدير النظام'; document.getElementById('userAvatar').textContent=(user.name||'م').charAt(0); }
            loadUsers();
        });
        function loadUsers() {
            var token = Auth.getToken();
            fetch('/api/users', {headers: {'Authorization': 'Bearer ' + token}})
            .then(function(res){return res.json();})
            .then(function(data){
                if(data.success&&data.users){renderTable(data.users);}
                else{document.getElementById('usersContainer').innerHTML='<div class="loading">لا توجد بيانات</div>';}
            });
        }
        function renderTable(users) {
            var c=document.getElementById('usersContainer');
            if(!users||users.length===0){c.innerHTML='<div class="loading">لا يوجد مستخدمون</div>';return;}
            var html='<div class="table-wrapper"><table><thead><tr><th>رقم</th><th>الاسم</th><th>البريد</th><th>الدور</th><th>تاريخ</th><th>إجراءات</th></tr></thead><tbody>';
            users.forEach(function(u){
                var roleClass=u.role==='admin'?'role-admin':'role-client';
                var roleLabel=u.role==='admin'?'مدير':'عميل';
                html+='<tr><td>#'+u.id+'</td><td>'+(u.name||'')+'</td><td>'+(u.email||'')+'</td><td><span class="role-badge '+roleClass+'">'+roleLabel+'</span></td><td>'+new Date(u.created_at).toLocaleDateString('ar-SA')+'</td><td>';
                html+='<button class="btn btn-edit" onclick="editUser('+u.id+')"><i class="fas fa-edit"></i> تعديل</button>';
                if(u.role!=='admin'){html+='<button class="btn btn-promote" onclick="promoteUser('+u.id+')"><i class="fas fa-arrow-up"></i> ترقي</button>';}
                html+='<button class="btn btn-delete" onclick="deleteUser('+u.id+')"><i class="fas fa-trash"></i> حذف</button>';
                html+='</td></tr>';
            });
            html+='</tbody></table></div>';
            c.innerHTML=html;
        }
        function editUser(id) {
            var token=Auth.getToken();
            Swal.fire({title:'تعديل مستخدم',html:'<input id="editName" class="swal2-input" placeholder="الاسم"><input id="editEmail" class="swal2-input" placeholder="البريد"><input id="editPassword" class="swal2-input" type="password" placeholder="كلمة مرور جديدة">',preConfirm:function(){return{name:document.getElementById('editName').value,email:document.getElementById('editEmail').value,password:document.getElementById('editPassword').value}}}).then(function(r){
                if(r.isConfirmed){
                    fetch('/api/users/'+id,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(r.value)}).then(function(res){return res.json();}).then(function(d){
                        if(d.success){Swal.fire('تم','تم التحديث','success').then(loadUsers);}else{Swal.fire('خطأ',d.message,'error');}
                    });
                }
            });
        }
        function promoteUser(id) {
            var token=Auth.getToken();
            Swal.fire({title:'ترقية مستخدم',text:'هل أنت متأكد من ترقية هذا المستخدم؟',icon:'question',showCancelButton:true}).then(function(r){
                if(r.isConfirmed){
                    fetch('/api/users/'+id+'/promote',{method:'PUT',headers:{'Authorization':'Bearer '+token}}).then(function(res){return res.json();}).then(function(d){
                        if(d.success){Swal.fire('تم','تم الترقية','success').then(loadUsers);}else{Swal.fire('خطأ',d.message,'error');}
                    });
                }
            });
        }
        function deleteUser(id) {
            var token=Auth.getToken();
            Swal.fire({title:'حذف مستخدم',text:'هل أنت متأكد؟',icon:'warning',showCancelButton:true,confirmButtonText:'حذف',cancelButtonText:'إلغاء'}).then(function(r){
                if(r.isConfirmed){
                    fetch('/api/users/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}}).then(function(res){return res.json();}).then(function(d){
                        if(d.success){Swal.fire('تم','تم الحذف','success').then(loadUsers);}else{Swal.fire('خطأ',d.message,'error');}
                    });
                }
            });
        }
        document.getElementById('logoutBtn').addEventListener('click',function(){Auth.logout();});
        var sideLogoutBtn=document.getElementById('sidebarLogoutBtn');
        if(sideLogoutBtn)sideLogoutBtn.addEventListener('click',function(){Auth.logout();});
    </script>
</body>
</html>
